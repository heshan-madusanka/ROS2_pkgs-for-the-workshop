# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    gripper_controller:
      type: position_controllers/GripperActionController


    arm_gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - base_link_01_joint
      - link_01_link_01_joint
      - link_02_link_03_joint
      - link_03_link_04_joint
      - link_04_link_05_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_nonzero_velocity_at_trajectory_end: true
gripper_controller:
  ros__parameters:
    joint: link_05_gripperR01_joint
arm_gripper_controller:
  ros__parameters:
    joints:
      - base_link_01_joint
      - link_01_link_01_joint
      - link_02_link_03_joint
      - link_03_link_04_joint
      - link_04_link_05_joint
      - link_05_gripperR01_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
    allow_nonzero_velocity_at_trajectory_end: true